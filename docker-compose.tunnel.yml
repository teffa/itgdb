services:
  web:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    command: /start.sh
    volumes:
      - .:/app
      - uploads:/app/uploads
    ports:
      - "8001:8000"
    env_file:
      - ./.env.tunnel
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    # --max-tasks-per-child=1: force a fresh worker process per task, since
    # long-lived forked processes can get a stale filesystem cache of
    # /app/uploads under Docker Desktop's Windows volume sharing, causing
    # newly-uploaded files to appear missing
    command: python -m celery -A itgdb worker -l info --max-tasks-per-child=1
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file:
      - ./.env.tunnel
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  uploads:
