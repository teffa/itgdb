version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    command: /start.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - redis
      - db
    networks:
      - ls

  celery_worker:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    command: /start-celeryworker.sh
    volumes:
      - .:/app
    env_file:
      - ./.env
    depends_on:
      - redis
      - db
    networks:
      - ls

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - ls

  redis:
    image: redis:7-alpine
    networks:
      - ls

volumes:
  postgres_data:

networks:
  ls: